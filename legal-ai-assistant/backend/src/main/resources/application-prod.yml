spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://elasticsearch:9200}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 3001

# AI Configuration
ai:
  minimax:
    base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat/v1}
    api-key: ${MINIMAX_API_KEY:}
    model: MiniMax-M3
    timeout: 120
    embedding-model: embo-01
    health-endpoint: /models
    health-timeout: 5

# Production: Mock disabled
mock:
  enabled: ${MOCK_ENABLED:false}

# Milvus Configuration
milvus:
  host: ${MILVUS_HOST:milvus}
  port: ${MILVUS_PORT:19530}
  collection-name: legal_law_articles
  dimension: 1536
  enabled: ${MILVUS_ENABLED:false}

# Elasticsearch Configuration
elasticsearch:
  host: ${ELASTICSEARCH_HOST:elasticsearch}
  port: ${ELASTICSEARCH_PORT:9200}
  index-name: legal_law_articles
  enabled: ${ELASTICSEARCH_ENABLED:false}
