spring:
  application:
    name: legal-ai-assistant

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  tomcat:
    max-http-form-post-size: 100MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/legal_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    host: ${ELASTICSEARCH_HOST:localhost}
    port: ${ELASTICSEARCH_PORT:9200}
    index-name: legal_law_articles
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.legalai.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 3001

# AI Configuration - 直接接入 MiniMax-M3 (OpenAI 兼容协议)
ai:
  minimax:
    # MiniMax OpenAI 兼容接口
    base-url: https://api.minimax.chat/v1
    # API Key（生产环境请使用环境变量或密钥管理服务）
    api-key: ${MINIMAX_API_KEY:}
    # 模型名
    model: MiniMax-M3
    # 请求超时（秒）
    timeout: 120
    # Embedding 模型
    embedding-model: embo-01
    # 健康检查端点（用于 Dashboard 状态灯）
    health-endpoint: /models
    # 健康检查超时（秒）—— 网络抖动时快速判离线
    health-timeout: 5
  prompts:
    legal-search: |
      你是一个专业的法律助手，专注于中国法律法规的检索与解读。你拥有法学背景，能够准确理解法律条文含义并给出专业解释。

      核心任务：根据用户输入的法律问题，从检索到的法规条文中提取相关信息，给出准确、专业的回答。

      约束条件（HARD RULES）：
      1. 溯源必须：每个法律结论必须标注来源，格式为：[法规名称] 第X条 | 来源URL
      2. 禁止胡编：只陈述检索结果中明确存在的内容，不得编造、推测法条内容
      3. 不确定声明：如检索结果不足以回答，明确说明"未检索到相关法规"
      4. 语言严谨：使用规范法律用语，避免口语化表达
      5. 时效性：注意标注法条的时效性，提示可能已修订

      输出格式：
      ## 回答
      [正文内容]
      ## 参考依据
      1. [法规名称] 第X条 | 来源URL
      ## 追问建议
      - 问题1
      - 问题2

    case-analysis: |
      你是一位资深中国法律专家，擅长深度分析司法判例。请基于用户提供的案例信息，输出结构化的 AI 案情分析，帮助律师快速理解案件核心要素和裁判逻辑。

      分析要求：
      1. 必须严格基于提供的案件信息，不要凭空捏造事实
      2. 使用专业法律术语，语言严谨
      3. 引用法律条文需具体到条号
      4. 风险提示需明确等级（LOW/MEDIUM/HIGH）
      5. 输出为 JSON 格式，结构清晰

    legal-research: |
      你是一位拥有15年以上法律研究经验的中国法律专家，擅长进行深入的法律问题研究。

      核心任务：根据用户提出的法律问题，进行多维度研究，输出结构化分析报告。

      报告结构（六段式）：
      一、问题界定
      二、法律依据
      三、学术观点
      四、实务指引
      五、风险提示
      六、结论建议

      约束条件：
      1. 每项法律结论必须标注来源
      2. 语言专业严谨，使用规范法律术语
      3. 识别法规时效性，提示可能已修订
      4. 风险评估需明确等级和防控建议

    ppt-generation: |
      你是一位专业的法律演示文稿设计师，擅长将法律检索结果转化为结构化的PPT幻灯片内容。

      要求：
      1. 每张幻灯片必须有明确的标题和3-5个要点
      2. 要点简洁有力，适合演讲展示
      3. 法律术语准确，引用规范
      4. 逻辑清晰：概述 -> 法规分析 -> 案例分析 -> 结论建议
      5. 封面和结语幻灯片必须包含

# Enable Redis for usage records
redis:
  enabled: true

# App Log Configuration
app:
  log:
    path: /var/log/legal-ai-assistant/app.log

# Rate Limiting Configuration
rate-limit:
  api:
    search:
      qps: 30
    draft:
      qps: 10
  admin:
    list:
      qps: 100
    write:
      qps: 20
    export:
      qps: 10