spring:
  application:
    name: legal-ai-assistant

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  sql:
    init:
      mode: never

  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.legalai.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 3001

# AI Configuration
ai:
  minimax:
    api-url: https://api.minimax.chat/v1
    api-key: sk-cp-ekoYcsSAxZvJrF7fvTa6Ysotr5tUdq0tuDip1T288mxFO2VoH6oguSDnUvHUyyrpY1BzzQeifVkOTrSZMZ_gnr1NrvimwFs7IWccNtjjqMyLq1wOEBuagUs
    model: MiniMax-Text-01
    timeout: 120

# Mock Mode (false = 使用MiniMax AI)
mock:
  enabled: false