spring:
  application:
    name: legal-ai-assistant

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/legal_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:main0126}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.legalai.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 3001

# AI Configuration - 直接接入 MiniMax-M3 (OpenAI 兼容协议)
ai:
  minimax:
    # MiniMax OpenAI 兼容接口
    base-url: https://api.minimax.chat/v1
    # API Key（生产环境请使用环境变量或密钥管理服务）
    api-key: ${MINIMAX_API_KEY:sk-cp-ekoYcsSAxZvJrF7fvTa6Ysotr5tUdq0tuDip1T288mxFO2VoH6oguSDnUvHUyyrpY1BzzQeifVkOTrSZMZ_gnr1NrvimwFs7IWccNtjjqMyLq1wOEBuagUs}
    # 模型名
    model: MiniMax-M3
    # 请求超时（秒）
    timeout: 120
    # Embedding 模型
    embedding-model: embo-01
    # 健康检查端点（用于 Dashboard 状态灯）
    health-endpoint: /models
    # 健康检查超时（秒）—— 网络抖动时快速判离线
    health-timeout: 5

# Mock Mode (false = 使用MiniMax AI)
mock:
  enabled: false

# Milvus Configuration
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: legal_law_articles
  dimension: 1536
  enabled: false

# Elasticsearch Configuration
elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  index-name: legal_law_articles
  enabled: false

# Redis Configuration
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: 0

# Enable Redis for usage records
redis.enabled: true