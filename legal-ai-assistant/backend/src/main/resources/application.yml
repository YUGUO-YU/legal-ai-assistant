spring:
  application:
    name: legal-ai-assistant

  datasource:
    url: jdbc:mysql://localhost:3306/legal_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: main0126
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      continue-on-error: true

  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.legalai.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 3001

# AI Configuration - OpenClaw Gateway
ai:
  openclaw:
    url: http://localhost:19001
    token: my-secret-token
    auto-start: true
    # 二进制可执行文件绝对路径，留空则自动在常见目录与 PATH 中查找
    binary-path:
    # 自定义配置文件路径，可选
    config-path:
    # 网关启动参数
    gateway-args: gateway --allow-unconfigured
    # 启动日志输出文件，留空则使用 java.io.tmpdir/openclaw_stderr.log
    log-path:
  minimax:
    model: minimax/MiniMax-M3
    timeout: 120

# Mock Mode (false = 使用MiniMax AI)
mock:
  enabled: false

# Milvus Configuration
milvus:
  host: localhost
  port: 19530
  collection-name: legal_law_articles
  dimension: 1536
  enabled: false

# Elasticsearch Configuration
elasticsearch:
  host: localhost
  port: 9200
  index-name: legal_law_articles
  enabled: false