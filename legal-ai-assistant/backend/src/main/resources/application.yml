spring:
  application:
    name: legal-ai-assistant

  datasource:
    url: jdbc:mysql://localhost:3306/legal_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: main0126
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      continue-on-error: true

  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.legalai.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 3001

# AI Configuration - 直接接入 MiniMax-M3
# 不再经过 OpenClaw 网关；使用 OpenAI 兼容协议
ai:
  minimax:
    # MiniMax OpenAI 兼容接口
    base-url: https://api.minimax.chat/v1
    # API Key（生产环境请使用环境变量或密钥管理服务）
    api-key: ${MINIMAX_API_KEY:sk-cp-ekoYcsSAxZvJrF7fvTa6Ysotr5tUdq0tuDip1T288mxFO2VoH6oguSDnUvHUyyrpY1BzzQeifVkOTrSZMZ_gnr1NrvimwFs7IWccNtjjqMyLq1wOEBuagUs}
    # 模型名
    model: MiniMax-M3
    # 请求超时（秒）
    timeout: 120
    # Embedding 模型
    embedding-model: embo-01

# Mock Mode (false = 使用MiniMax AI)
mock:
  enabled: false

# Milvus Configuration
milvus:
  host: localhost
  port: 19530
  collection-name: legal_law_articles
  dimension: 1536
  enabled: false

# Elasticsearch Configuration
elasticsearch:
  host: localhost
  port: 9200
  index-name: legal_law_articles
  enabled: false