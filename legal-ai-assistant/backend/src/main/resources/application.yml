spring:
  application:
    name: legal-ai-assistant

  datasource:
    url: jdbc:mysql://localhost:3306/legal_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: main0126
    driver-class-name: com.mysql.cj.jdbc.Driver

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  sql:
    init:
      mode: never

  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.legalai.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 3001

# AI Configuration - OpenClaw Gateway
ai:
  openclaw:
    url: http://localhost:19001
    token: my-secret-token
  minimax:
    model: openclaw
    timeout: 120

# Mock Mode (false = 使用MiniMax AI)
mock:
  enabled: false

# Milvus Configuration
milvus:
  host: localhost
  port: 19530
  collection-name: legal_law_articles
  dimension: 1536
  enabled: false

# Elasticsearch Configuration
elasticsearch:
  host: localhost
  port: 9200
  index-name: legal_law_articles
  enabled: false