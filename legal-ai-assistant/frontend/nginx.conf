server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩（减少 60-80% 传输体积）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss image/svg+xml;
    gzip_disable "msie6";
    # Brotli（比 gzip 再小 15-25%）
    # 需要 nginx 安装: apt install libnginx-mod-http-brotli
    # brotli on;
    # brotli_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss image/svg+xml;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态资源长期缓存（文件名含 content-hash，可永不过期）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html 不缓存（确保加载最新 JS bundle）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 前端路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API代理到后端
    location /api {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 高并发连接复用
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # 避免 502：后端启动慢时等待
        proxy_buffering off;
    }

    # 连接数限制（防止单 IP 耗尽资源）
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    location / {
        limit_conn addr 200;
        limit_conn_status 429;
    }

    # 静态文件高效传输
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 日志优化
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
